name: Preview Build

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "AGENTS.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "README.md"
      - "assets/**"
      - "docs/**"
      - "packaging/winget/**"
      - "packaging/windows/**"
      - "pyproject.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: preview-build-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Generate assets
        shell: powershell
        run: python scripts/generate_assets.py

      - name: Build bundle and installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1 -Clean

      - name: Upload preview installer
        uses: actions/upload-artifact@v4
        with:
          name: trayffeine-preview-installer-${{ github.event.pull_request.number || github.run_number }}
          path: dist/installer/*.exe
          if-no-files-found: error
