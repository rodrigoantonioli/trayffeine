name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Generate assets
        shell: powershell
        run: python scripts/generate_assets.py

      - name: Build bundle and installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1 -Version "${{ github.ref_name }}" -Clean

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: trayffeine-installer
          path: dist/installer/*.exe

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/*.exe
