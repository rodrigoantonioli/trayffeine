name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[build]

      - name: Generate assets
        shell: powershell
        run: python scripts/generate_assets.py

      - name: Build bundle and installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File packaging\windows\build.ps1 -Version "${{ github.ref_name }}" -Clean

      - name: Publish release assets
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $isPrerelease = $tag -like "*-beta*"
          $files = Get-ChildItem -Path dist\installer -Filter *.exe | ForEach-Object { $_.FullName }
          if (-not $files) {
            throw "No installer artifact found in dist\installer"
          }

          gh release view $tag | Out-Null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "gh release upload failed"
            }
            exit 0
          }

          $createArgs = @("release", "create", $tag)
          if ($isPrerelease) {
            $createArgs += "--prerelease"
          }
          $createArgs += $files
          $createArgs += @("--title", $tag, "--generate-notes")

          gh @createArgs
          if ($LASTEXITCODE -ne 0) {
            throw "gh release create failed"
          }

      - name: Submit WinGet update
        if: ${{ !contains(github.ref_name, '-beta') && secrets.WINGET_GITHUB_PAT != '' }}
        shell: powershell
        env:
          WINGET_GITHUB_PAT: ${{ secrets.WINGET_GITHUB_PAT }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/Trayffeine-Setup-$version.exe"

          powershell -ExecutionPolicy Bypass -File packaging\winget\update.ps1 `
            -PackageIdentifier "RodrigoAntonioli.Trayffeine" `
            -PackageVersion $version `
            -InstallerUrl $installerUrl `
            -GitHubToken $env:WINGET_GITHUB_PAT
